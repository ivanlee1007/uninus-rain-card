<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Uninus Rain Card responsive preview</title>
  <style>
    :root { --ha-card-border-radius: 16px; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 28px; color: #e2e8f0; background: #0f172a; font-family: system-ui, sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:22px; }
    h1 { margin:0; font-size:22px; }
    button { padding:9px 14px; border:0; border-radius:10px; font-weight:700; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px; align-items:start; }
    .case { padding:14px; border:1px solid #334155; border-radius:16px; background:#111c31; }
    .case p { margin:0 0 10px; color:#94a3b8; font-size:12px; }
    .tiny { width:210px; height:64px; }
    .compact { width:320px; height:64px; }
    .regular { width:100%; min-width:360px; height:82px; }
    .expanded { width:100%; height:150px; }
    uninus-rain-card { display:block; width:100%; height:100%; }
    @media(max-width:760px) { .grid { grid-template-columns:1fr; } .regular { min-width:0; } }
  </style>
  <script>
    customElements.define("ha-card", class extends HTMLElement {});
    customElements.define("ha-icon", class extends HTMLElement {
      static get observedAttributes() { return ["icon"]; }
      connectedCallback() { this.render(); }
      attributeChangedCallback() { this.render(); }
      render() { this.textContent = this.getAttribute("icon")?.includes("pouring") ? "🌧" : this.getAttribute("icon")?.includes("question") ? "❔" : "🌤"; }
    });
  </script>
  <script type="module" src="../uninus-rain-card.js?v=4"></script>
</head>
<body>
  <header><h1>Uninus Rain Card — responsive preview</h1><button id="toggle">切換下雨／沒下雨</button></header>
  <div class="grid">
    <div class="case"><p>tiny · 210 × 64</p><div class="tiny"><uninus-rain-card></uninus-rain-card></div></div>
    <div class="case"><p>compact · 320 × 64</p><div class="compact"><uninus-rain-card></uninus-rain-card></div></div>
    <div class="case"><p>regular · flexible × 82</p><div class="regular"><uninus-rain-card></uninus-rain-card></div></div>
    <div class="case"><p>expanded · flexible × 150</p><div class="expanded"><uninus-rain-card></uninus-rain-card></div></div>
  </div>
  <script type="module">
    await customElements.whenDefined("uninus-rain-card");
    let raining = true;
    const cards = [...document.querySelectorAll("uninus-rain-card")];
    const render = () => cards.forEach((card) => {
      card.setConfig({ entity:"sensor.rain_state", name:"降雨監測", secondary_text:"北棟屋頂" });
      card.hass = { states: { "sensor.rain_state": { state: raining ? "下雨中" : "沒下雨", attributes: {} } } };
    });
    document.querySelector("#toggle").addEventListener("click", () => { raining = !raining; render(); });
    render();
  </script>
</body>
</html>
